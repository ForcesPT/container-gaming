# DpadCloud Sunshine Config
# Headless mode - no physical monitor needed

# Capture
min_threads = 8
hevc_mode = 0
av1_mode = 0
fps = [60,90,120]
resolutions = [
  1280x720,
  1920x1080,
  2560x1440,
  3840x2160
]

# Network
upnp = disabled
address_family = both

# Output
output_name = 0

# Input
gamepad = x360
key_rightalt_to_key_win = disabled

# Web UI — must be `wan` for remote/Vast.ai access (lan blocks it)
origin_web_ui_allowed = wan

# Optional: shift Sunshine base port (e.g. 70005) for Vast.ai identity ports.
# Leave commented for default 47989. Moonlight connects to <ip>:<this port>.
# port = 47989
